# 复制本文件为以下之一后填写密钥（不要提交真实 Key）：
#   %UserData%/providers.yaml  （Electron 下为 D:\Screenplay-Studio-data\UserData\providers.yaml）
# 或 backend/config/providers.yaml（开发时）
#
# api_key_env：从环境变量读取 API Key（推荐）
# extra_headers：部分国内厂商需要的鉴权头

presets:
  - id: deepseek-openai
    label: DeepSeek（OpenAI 兼容）
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    extra_headers: {}

  - id: siliconflow
    label: SiliconFlow 示例
    base_url: https://api.siliconflow.cn/v1
    model: Qwen/Qwen2.5-7B-Instruct
    api_key_env: SILICONFLOW_API_KEY
    extra_headers: {}

  - id: dashscope-openai
    label: 阿里云 DashScope OpenAI 兼容
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-max
    api_key_env: DASHSCOPE_API_KEY
    extra_headers: {}

  - id: local-ollama
    label: 本地 Ollama
    base_url: http://127.0.0.1:11434/v1
    model: llama3.1
    api_key_env: ""
    extra_headers: {}
